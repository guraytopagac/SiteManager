<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mavikent</title>
    <link rel="stylesheet" href="splash.css" />
  </head>
  <body>
    <div class="splash-content">
      <img src="../../../assets/logo.webp" alt="Mavikent Logo" width="72" height="72" class="splash-logo" />

      <h1 class="splash-title">Mavikent Site Yönetimi</h1>

      <div class="splash-update-badge" id="update-badge">
        <img src="../../../assets/download.svg" alt="" width="12" height="12" class="splash-badge-icon" />
        <span id="update-badge-text">Güncelleme İndiriliyor</span>
      </div>

      <p class="splash-status" id="status">
        Başlatılıyor<span class="splash-dot">.</span><span class="splash-dot">.</span><span class="splash-dot">.</span>
      </p>

      <div class="splash-progress-wrap" id="progress-wrap">
        <div class="splash-progress-track">
          <div class="splash-progress-fill" id="progress-fill"></div>
        </div>
        <div class="splash-progress-info">
          <span id="progress-percent">%0</span>
          <span class="splash-progress-status" id="progress-status">( Güncelleme indiriliyor ... )</span>
          <span id="progress-size"></span>
        </div>
      </div>

      <div class="splash-version-pill">
        <span id="version">v—</span>
      </div>
    </div>

    <script src="splash.js"></script>
  </body>
</html>
